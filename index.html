<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>For Lyraa ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="stars"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div id="loader">

<h2>Preparing a little surprise...</h2>

</div>

<main id="app">

<section id="scene1" class="scene active">

<div class="glass" id="welcomeCard">
<div id="progress">01 / 08</div>
<h1 id="title"><span id="typing"></span></h1>

<p class="subtitle" id="subtitle">
I promise this won't take long... 😊
</p>

<button id="startBtn">

Continue ✨

</button>

</div>

</section>
<section id="finalScene" class="scene">

<div class="glass">

<h1>💙</h1>

<p id="finalText">

A special message is loading...

</p>

<p id="finalSignature">
Made with ❤️<br><br>

Especially for you.<br><br>

— From your favourite Side Chick 🐣
</p>

</div>

</section>

</main>

<audio id="bgMusic" loop>
    <source src="assets/music/background.mp3" type="audio/mpeg">
</audio>

<script src="style.js"></script>

</body>

</html>
